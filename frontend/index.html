<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks API</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
    {
        "imports": {
        "axios": "https://cdn.jsdelivr.net/npm/axios/+esm"
        }
    }
    </script>
    <script type="module" src="dist/main.js"></script>
    <script type="module" src="dist/types.js"></script>
</head>
<body>
    <button type="button" class="plus-button" aria-label="Add task">+</button>

    <div class="app-layout">
        <main class="main-content">
            <h1>Tasks API</h1>
            <h3>Tasks fetched</h3>
        </main>

        <aside
            class="error-panel"
            id="error-panel"
            aria-live="polite"
            aria-label="Errors and notifications"
        >
            <header class="error-panel__header">
                <h2 class="error-panel__title">Notifications</h2>
            </header>

            <div class="error-list" id="error-list"></div>

            <p class="error-panel__empty">No issues to show.</p>
        </aside>
    </div>
</body>
</html>
